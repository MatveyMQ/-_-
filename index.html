<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С 8 Марта 🌷</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background: radial-gradient(circle at top,#1a1a1a,#000);
  color:#fff;
  overflow-x:hidden;
}

.main{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px 20px;
  position:relative;
}

.glow{
  position:absolute;
  width:800px;
  height:800px;
  background:radial-gradient(circle,#ff4da6 0%,transparent 70%);
  filter:blur(140px);
  opacity:0.4;
  animation:pulse 6s infinite alternate;
}

@keyframes pulse{
  from{opacity:0.3;}
  to{opacity:0.6;}
}

.card{
  position:relative;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(30px);
  border-radius:40px;
  padding:60px 40px;
  max-width:900px;
  width:100%;
  text-align:center;
  box-shadow:0 30px 80px rgba(0,0,0,0.7);
  z-index:2;
}

h1{
  font-size:40px;
  margin-bottom:20px;
}

p{
  font-size:18px;
  line-height:1.6;
  margin-bottom:50px;
  opacity:0.85;
}

.section-title{
  margin:40px 0 20px;
  font-weight:500;
  letter-spacing:1px;
}

/* Яндекс iframe */
.music iframe{
  width:100%;
  height:244px;
  border:none;
  border-radius:20px;
}

/* YouTube адаптив */
.video-wrapper{
  position:relative;
  width:100%;
  padding-bottom:56.25%;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

.video-wrapper iframe{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  border:none;
}

@media (max-width:600px){
  .card{
    padding:40px 20px;
    border-radius:25px;
  }
  h1{
    font-size:26px;
  }
}
</style>
</head>

<body>

<div class="main">
  <div class="glow"></div>

  <div class="card">
    <h1>С 8 Марта, моя прекрасная 🌷</h1>

    <p>
      Пусть этот день подарит тебе море улыбок и счастья.<br>
      Ты — самое светлое, что есть в моей жизни.
    </p>

    <div class="section-title">🎵 Cold Carti — Твоими глазами</div>

<div class="music">
  <iframe 
    src="https://music.yandex.ru/iframe/album/27015943/track/116515817"
    allow="clipboard-write">
  </iframe>
</div>

<div class="section-title"></div>

<div class="video-wrapper">
  <iframe 
    src="https://www.youtube.com/embed/AZ1psyyKmMY"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>
</div>

  </div>
</div>

</body>
</html>
