<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>С 8 Марта 🌷</title>
  <style>
    /* Абсолютный сброс */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Заставляем html и body занимать всю высоту */
    html, body {
      width: 100%;
      height: 100%; /* явная высота */
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    body {
      background: radial-gradient(circle at top, #1a1a1a, #000) fixed; /* фиксируем фон */
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      /* Растягиваем body на всю высоту */
      display: flex;
      flex-direction: column;
    }

    .star {
      position: absolute;
      width: 12px;
      height: 12px;
      opacity: 0;
      animation: twinkle linear infinite;
      pointer-events: none;
      z-index: 1;
    }

    .star svg {
      width: 100%;
      height: 100%;
      fill: white;
      filter: drop-shadow(0 0 3px rgba(255, 255, 255, 0.5));
    }

    @keyframes twinkle {
      0% { opacity: 0; transform: scale(0.8); }
      50% { opacity: 0.9; transform: scale(1.1); }
      100% { opacity: 0; transform: scale(0.8); }
    }

    .glow {
      position: absolute;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, #ff4da6 0%, transparent 70%);
      filter: blur(140px);
      opacity: 0.35;
      animation: pulse 6s infinite alternate;
      z-index: 1;
    }

    @keyframes pulse {
      from { opacity: 0.3; transform: scale(1); }
      to { opacity: 0.5; transform: scale(1.1); }
    }

    .main {
      flex: 1; /* занимает всё доступное место */
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      z-index: 2;
    }

    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(30px);
      border-radius: 40px;
      padding: 60px 40px;
      max-width: 900px;
      width: 100%;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
      z-index: 3;
      margin: auto; /* центрирование */
    }

    .fade {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 1.5s ease forwards;
    }

    .fade.delay1 { animation-delay: 0.5s; }
    .fade.delay2 { animation-delay: 1.2s; }
    .fade.delay3 { animation-delay: 1.8s; }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 40px;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 50px;
      opacity: 0.9;
    }

    /* --- Единый медиа-блок --- */
    .minimal-media {
      margin: 20px 0;
      width: 100%;
      touch-action: pan-y pinch-zoom;
    }

    .media-player {
      display: none;
    }

    .media-player.active {
      display: block;
    }

    .media-player iframe {
      width: 100%;
      border: none;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    /* Яндекс.Музыка */
    #player-yandex iframe {
      height: 244px;
    }

    /* YouTube */
    .video-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* Две точки */
    .media-switch {
      display: flex;
      justify-content: center;
      gap: 25px;
      margin-top: 25px;
    }

    .switch-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: all 0.2s ease;
      padding: 8px;
      background-clip: content-box;
      position: relative;
    }

    .switch-dot:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      white-space: nowrap;
      margin-bottom: 8px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      pointer-events: none;
      z-index: 10;
    }

    .switch-dot.active {
      background: #ff4da6;
      box-shadow: 0 0 12px #ff4da6;
      transform: scale(1.2);
    }

    /* --- Мобильная версия без белых полос --- */
    @media (max-width: 600px) {
      .main {
        padding: 0; /* полностью убираем отступы */
      }

      .card {
        padding: 30px 16px;
        border-radius: 0; /* карточка на всю ширину без скругления */
        max-width: 100%;
        min-height: 100dvh; /* занимает всю высоту */
        display: flex;
        flex-direction: column;
        justify-content: center; /* центрируем содержимое по вертикали */
        margin: 0;
      }

      h1 {
        font-size: 24px;
        margin-bottom: 16px;
      }

      p {
        font-size: 15px;
        margin-bottom: 30px;
        line-height: 1.5;
      }

      #player-yandex iframe {
        height: 160px;
      }

      .glow {
        width: 250px;
        height: 250px;
        opacity: 0.12;
      }

      .switch-dot {
        width: 18px;
        height: 18px;
        padding: 10px;
      }

      .switch-dot:hover::after {
        display: none;
      }
    }
  </style>
</head>
<body>
  <!-- Все элементы остаются без изменений -->
  <div class="stars"></div>
  <div class="main">
    <div class="glow"></div>
    <div class="card">
      <h1 class="fade">С 8 Марта, моя прекрасная 🌷</h1>
      <p class="fade delay1">
        Пусть этот день подарит тебе море улыбок и счастья.<br>
        Ты — самое светлое, что есть в моей жизни.
      </p>

      <div class="minimal-media fade delay2" id="swipe-container">
        <!-- Яндекс.Музыка -->
        <div class="media-player active" id="player-yandex">
          <iframe 
            title="Яндекс.Музыка"
            src="https://music.yandex.ru/iframe/album/27015943/track/116515817"
            allow="autoplay; clipboard-write"
            loading="lazy">
          </iframe>
        </div>

        <!-- YouTube -->
        <div class="media-player" id="player-youtube">
          <div class="video-wrapper">
            <iframe 
              title="YouTube"
              src="https://www.youtube.com/embed/AZ1psyyKmMY"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen
              loading="lazy">
            </iframe>
          </div>
        </div>

        <!-- Две точки -->
        <div class="media-switch">
          <span class="switch-dot active" data-media="yandex" data-tooltip="Яндекс.Музыка"></span>
          <span class="switch-dot" data-media="youtube" data-tooltip="YouTube"></span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // (весь скрипт остаётся без изменений)
    // Вставьте сюда полный скрипт из предыдущего ответа
  </script>
</body>
</html>
