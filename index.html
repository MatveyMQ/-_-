<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>С 8 Марта ❤️</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background-color: #1a1a1a; /* тёмный фон */
    color: #ffe6f0; /* нежно-розовый текст */
    text-align: center;
    overflow-x: hidden;
}
.container {
    padding: 50px 20px;
}
h1 {
    font-size: 48px;
    margin-bottom: 20px;
}
p {
    font-size: 22px;
    max-width: 600px;
    margin: 20px auto;
    line-height: 1.6;
}
img.rose {
    width: 80px;
    margin: 10px;
    animation: float 6s ease-in-out infinite;
}
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
    100% { transform: translateY(0px); }
}
audio {
    margin-top: 30px;
}
</style>
</head>
<body>

<div class="container">
    <h1>С 8 Марта, моя прекрасная 🌸</h1>

    <p>
        Пусть этот день подарит тебе море улыбок и счастья.  
        Ты — самое светлое, что есть в моей жизни. ❤️
    </p>

    <!-- Розочки -->
    <div>
        <img class="rose" src="rose1.png" alt="🌹">
        <img class="rose" src="rose2.png" alt="🌹">
        <img class="rose" src="rose3.png" alt="🌹">
    </div>

    <!-- Музыка -->
    <audio autoplay loop controls>
        <source src="music.mp3" type="audio/mpeg">
        Ваш браузер не поддерживает аудио.
    </audio>
</div>

</body>
</html>
