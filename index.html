<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С 8 Марта 🌸</title>
<style>
/* Общие стили */
body {
  margin: 0;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: linear-gradient(120deg, #1a1a1a, #2b2b2b); /* градиент вместо черного */
  color: #fff;
  overflow-x: hidden;
  min-height: 100vh;
}

.container {
  text-align: center;
  padding: 50px 20px;
}

/* Заголовок */
h1 {
  font-size: 40px;
  color: #ffb6c1;
  margin-bottom: 20px;
  opacity: 0;
  animation: fadeIn 1.5s forwards 0.5s;
}

/* Текст */
p {
  font-size: 18px;
  max-width: 500px;
  margin: 20px auto;
  line-height: 1.6;
  opacity: 0;
  animation: fadeIn 1.5s forwards 1.5s;
}

/* Падающие лепестки */
.leaf {
  position: fixed;
  top: -50px;
  width: 30px;
  height: 30px;
  background: radial-gradient(circle at 50% 50%, #ffb6c1 0%, #ff69b4 80%);
  border-radius: 50%;
  opacity: 0.8;
  pointer-events: none;
  animation-name: fall;
  animation-timing-function: linear;
  animation-iteration-count: infinite;
}

@keyframes fadeIn { to { opacity: 1; } }

@keyframes fall {
  0% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
  100% { transform: translateY(120vh) rotate(360deg); opacity: 0; }
}

/* Spotify плеер */
.spotify {
  margin-top: 30px;
  border-radius: 12px;
  overflow: hidden;
  display: inline-block;
  width: 80%;
  max-width: 300px;
}

/* Адаптивность */
@media (max-width: 480px) {
  h1 { font-size: 32px; }
  p { font-size: 16px; }
}
</style>
</head>
<body>

<div class="container">
  <h1>С 8 Марта, моя прекрасная 🌸</h1>

  <p>
    Пусть этот день подарит тебе море улыбок и счастья.<br>
    Ты — самое светлое, что есть в моей жизни. ❤️
  </p>

  <!-- Spotify плеер -->
  <div class="spotify">
    <iframe src="https://open.spotify.com/embed/track/3n3Ppam7vgaVa1iaRUc9Lp" width="100%" height="80" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>
  </div>
</div>

<!-- JS: падающие лепестки -->
<script>
const leafCount = 15; // количество лепестков
for(let i=0;i<leafCount;i++){
  const leaf = document.createElement('div');
  leaf.className = 'leaf';
  leaf.style.left = Math.random()*100 + 'vw';
  leaf.style.animationDuration = (5 + Math.random()*5) + 's';
  leaf.style.animationDelay = Math.random()*5 + 's';
  leaf.style.width = 15 + Math.random()*20 + 'px';
  leaf.style.height = leaf.style.width;
  document.body.appendChild(leaf);
}
</script>

</body>
</html>
