<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>С 8 Марта 🌷</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      width: 100%;
      min-height: 100vh;
      background: radial-gradient(circle at top, #1a1a1a, #000);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow-x: hidden;
    }

    body {
      position: relative;
    }

    .star {
      position: absolute;
      width: 12px;
      height: 12px;
      opacity: 0;
      animation: twinkle linear infinite;
      pointer-events: none;
      z-index: 1;
    }

    .star svg {
      width: 100%;
      height: 100%;
      fill: white;
      filter: drop-shadow(0 0 3px rgba(255, 255, 255, 0.5));
    }

    @keyframes twinkle {
      0% { opacity: 0; transform: scale(0.8); }
      50% { opacity: 0.9; transform: scale(1.1); }
      100% { opacity: 0; transform: scale(0.8); }
    }

    .glow {
      position: absolute;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, #ff4da6 0%, transparent 70%);
      filter: blur(140px);
      opacity: 0.35;
      animation: pulse 6s infinite alternate;
      z-index: 1;
    }

    @keyframes pulse {
      from { opacity: 0.3; transform: scale(1); }
      to { opacity: 0.5; transform: scale(1.1); }
    }

    .main {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      position: relative;
      z-index: 2;
    }

    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(30px);
      border-radius: 40px;
      padding: 60px 40px;
      max-width: 900px;
      width: 100%;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
      z-index: 3;
    }

    .fade {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 1.5s ease forwards;
    }

    .fade.delay1 { animation-delay: 0.5s; }
    .fade.delay2 { animation-delay: 1.2s; }
    .fade.delay3 { animation-delay: 1.8s; }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 40px;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 50px;
      opacity: 0.9;
    }

    /* --- Единый медиа-блок --- */
    .minimal-media {
      margin: 20px 0;
      width: 100%;
      touch-action: pan-y pinch-zoom; /* разрешаем вертикальную прокрутку, горизонтальную будем обрабатывать сами */
    }

    .media-player {
      display: none;
    }

    .media-player.active {
      display: block;
    }

    .media-player iframe {
      width: 100%;
      border: none;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    /* Яндекс.Музыка */
    #player-yandex iframe {
      height: 244px;
    }

    /* Spotify */
    #player-spotify iframe {
      height: 152px;
    }

    /* YouTube (видео) */
    .video-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 16:9 */
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* Точки навигации (без стрелок) */
    .media-switch {
      display: flex;
      justify-content: center;
      gap: 25px;
      margin-top: 25px;
    }

    .switch-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: all 0.2s ease;
      padding: 8px;
      background-clip: content-box;
      position: relative;
    }

    /* Подсказка при наведении (на ПК) */
    .switch-dot:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      white-space: nowrap;
      margin-bottom: 8px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      pointer-events: none;
      z-index: 10;
    }

    .switch-dot.active {
      background: #ff4da6;
      box-shadow: 0 0 12px #ff4da6;
      transform: scale(1.2);
    }

    /* --- Мобильные улучшения --- */
    @media (max-width: 600px) {
      .main {
        padding: 20px 10px;
      }

      .card {
        padding: 30px 16px;
        border-radius: 24px;
      }

      h1 {
        font-size: 24px;
        margin-bottom: 16px;
      }

      p {
        font-size: 15px;
        margin-bottom: 30px;
        line-height: 1.5;
      }

      #player-yandex iframe {
        height: 160px;
      }

      #player-spotify iframe {
        height: 132px;
      }

      .glow {
        width: 250px;
        height: 250px;
        opacity: 0.12;
      }

      .switch-dot {
        width: 18px;
        height: 18px;
        padding: 10px;
      }

      .switch-dot:hover::after {
        display: none;
      }
    }
  </style>
</head>
<body>

<div class="stars"></div>

<div class="main">
  <div class="glow"></div>

  <div class="card">
    <h1 class="fade">С 8 Марта, моя прекрасная 🌷</h1>

    <p class="fade delay1">
      Пусть этот день подарит тебе море улыбок и счастья.<br>
      Ты — самое светлое, что есть в моей жизни.
    </p>

    <!-- Единый медиа-блок: Яндекс.Музыка, Spotify, YouTube -->
    <div class="minimal-media fade delay2" id="swipe-container">
      <!-- Яндекс.Музыка (активна по умолчанию) -->
      <div class="media-player active" id="player-yandex">
        <iframe 
          title="Яндекс.Музыка"
          src="https://music.yandex.ru/iframe/album/27015943/track/116515817"
          allow="autoplay; clipboard-write"
          loading="lazy">
        </iframe>
      </div>

      <!-- Spotify -->
      <div class="media-player" id="player-spotify">
        <iframe 
          style="border-radius:12px"
          src="https://open.spotify.com/embed/track/6NGzHs6RPPbK40ET9YX7V4?utm_source=generator&theme=0"
          width="100%"
          height="152"
          frameBorder="0"
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          loading="lazy">
        </iframe>
      </div>

      <!-- YouTube (видео) -->
      <div class="media-player" id="player-youtube">
        <div class="video-wrapper">
          <iframe 
            title="YouTube"
            src="https://www.youtube.com/embed/AZ1psyyKmMY"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
            loading="lazy">
          </iframe>
        </div>
      </div>

      <!-- Точки навигации (стрелки убраны) -->
      <div class="media-switch">
        <span class="switch-dot active" data-media="yandex" data-tooltip="Яндекс.Музыка"></span>
        <span class="switch-dot" data-media="spotify" data-tooltip="Spotify"></span>
        <span class="switch-dot" data-media="youtube" data-tooltip="YouTube"></span>
      </div>
    </div>
  </div>
</div>

<script>
  (function() {
    // --- Звёзды ---
    function debounce(func, wait) {
      let timeout;
      return function executedFunction(...args) {
        const later = () => {
          clearTimeout(timeout);
          func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
      };
    }

    function generateStars() {
      const starsContainer = document.querySelector('.stars');
      const card = document.querySelector('.card');
      if (!starsContainer || !card) return;

      starsContainer.innerHTML = '';

      const starCount = window.innerWidth < 600 ? 30 : 50;
      const rect = card.getBoundingClientRect();
      const safeArea = {
        left: rect.left,
        top: rect.top,
        right: rect.right,
        bottom: rect.bottom,
        width: window.innerWidth,
        height: window.innerHeight
      };

      function isInsideCard(xPercent, yPercent) {
        const x = (xPercent / 100) * safeArea.width;
        const y = (yPercent / 100) * safeArea.height;
        return (x >= safeArea.left && x <= safeArea.right &&
                y >= safeArea.top && y <= safeArea.bottom);
      }

      let starsCreated = 0;
      const maxAttempts = 500;
      let attempts = 0;

      while (starsCreated < starCount && attempts < maxAttempts) {
        attempts++;

        const x = Math.random() * 100;
        const y = Math.random() * 100;

        if (isInsideCard(x, y)) continue;

        const star = document.createElement('div');
        star.classList.add('star');

        const size = Math.random() * 10 + 6;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = x + '%';
        star.style.top = y + '%';
        star.style.animationDuration = (Math.random() * 4 + 4) + 's';
        star.style.animationDelay = (Math.random() * 5) + 's';

        star.innerHTML = `
          <svg viewBox="0 0 24 24">
            <path d="M12 2 L14 9 L22 12 L14 15 L12 22 L10 15 L2 12 L10 9 Z"/>
          </svg>
        `;

        if (Math.random() > 0.75) {
          star.querySelector('svg').style.fill = '#ff4da6';
        }

        starsContainer.appendChild(star);
        starsCreated++;
      }
    }

    document.addEventListener('DOMContentLoaded', generateStars);
    window.addEventListener('resize', debounce(generateStars, 150));

    // --- Логика переключения плееров (точки + свайп ТОЛЬКО НА МОБИЛЬНЫХ) ---
    document.addEventListener('DOMContentLoaded', function() {
      const container = document.getElementById('swipe-container');
      const dots = document.querySelectorAll('.switch-dot');
      const players = {
        yandex: document.getElementById('player-yandex'),
        spotify: document.getElementById('player-spotify'),
        youtube: document.getElementById('player-youtube')
      };
      const mediaList = ['yandex', 'spotify', 'youtube'];

      // Функция активации плеера по ключу
      function activateMedia(mediaKey) {
        dots.forEach(d => d.classList.remove('active'));
        Object.values(players).forEach(p => p?.classList.remove('active'));

        const targetDot = Array.from(dots).find(d => d.dataset.media === mediaKey);
        if (targetDot) targetDot.classList.add('active');

        if (players[mediaKey]) {
          players[mediaKey].classList.add('active');
        }
      }

      // Клик по точкам (работает везде)
      dots.forEach(dot => {
        dot.addEventListener('click', function() {
          const media = this.dataset.media;
          activateMedia(media);
        });
      });

      // --- Свайп только для мобильных устройств (touch) ---
      // Проверяем, поддерживает ли устройство touch
      const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

      if (isTouchDevice) {
        let startX = 0;
        let startY = 0;
        let isSwiping = false;
        const swipeThreshold = 50; // минимальное расстояние для свайпа

        function handleSwipe(deltaX, deltaY) {
          if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > swipeThreshold) {
            // Горизонтальный свайп
            const currentActive = Array.from(dots).find(d => d.classList.contains('active'));
            if (!currentActive) return;
            const currentIndex = mediaList.indexOf(currentActive.dataset.media);
            let newIndex;
            if (deltaX > 0) {
              // свайп вправо -> предыдущий
              newIndex = (currentIndex - 1 + mediaList.length) % mediaList.length;
            } else {
              // свайп влево -> следующий
              newIndex = (currentIndex + 1) % mediaList.length;
            }
            activateMedia(mediaList[newIndex]);
          }
        }

        container.addEventListener('touchstart', (e) => {
          const touch = e.touches[0];
          startX = touch.clientX;
          startY = touch.clientY;
          isSwiping = true;
        });

        container.addEventListener('touchmove', (e) => {
          if (!isSwiping) return;
          e.preventDefault(); // предотвращаем прокрутку страницы
        });

        container.addEventListener('touchend', (e) => {
          if (!isSwiping) return;
          const touch = e.changedTouches[0];
          const deltaX = touch.clientX - startX;
          const deltaY = touch.clientY - startY;
          handleSwipe(deltaX, deltaY);
          isSwiping = false;
        });

        container.addEventListener('touchcancel', () => {
          isSwiping = false;
        });
      }
    });
  })();
</script>
</body>
</html>
