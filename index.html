<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С 8 Марта 🌷</title>
<style>
body {
  margin: 0;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: linear-gradient(120deg, #1a1a1a, #2b2b2b);
  color: #ffe6f0;
  overflow-x: hidden;
  min-height: 100vh;
}

.container {
  text-align: center;
  padding: 50px 20px;
  position: relative;
  z-index: 2;
}

h1 {
  font-size: 40px;
  color: #ffb6c1;
  margin-bottom: 20px;
  opacity: 0;
  animation: fadeIn 1.5s forwards 0.5s;
}

p {
  font-size: 18px;
  max-width: 500px;
  margin: 20px auto;
  line-height: 1.6;
  opacity: 0;
  animation: fadeIn 1.5s forwards 1.5s;
}

.spotify {
  margin-top: 30px;
  border-radius: 12px;
  overflow: hidden;
  display: inline-block;
  width: 80%;
  max-width: 300px;
  z-index: 2;
  position: relative;
}

@keyframes fadeIn { to { opacity: 1; } }

@keyframes fall {
  0% { transform: translateY(-50px) rotate(0deg); }
  100% { transform: translateY(120vh) rotate(360deg); }
}

@media (max-width: 480px) {
  h1 { font-size: 32px; }
  p { font-size: 16px; }
}
</style>
</head>
<body>

<div class="container">
  <h1>С 8 Марта, моя прекрасная 🌷</h1>

  <p>
    Пусть этот день подарит тебе море улыбок и счастья.<br>
    Ты — самое светлое, что есть в моей жизни. ❤️
  </p>

  <div class="spotify">
    <iframe src="https://open.spotify.com/embed/track/3n3Ppam7vgaVa1iaRUc9Lp" width="100%" height="80" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>
  </div>
</div>

<script>
// массив ссылок на маленькие цветные тюльпаны (PNG)
const tulipImages = [
  'https://upload.wikimedia.org/wikipedia/commons/thumb/3/39/Red_Tulip_icon.svg/32px-Red_Tulip_icon.svg.png',
  'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Pink_Tulip_icon.svg/32px-Pink_Tulip_icon.svg.png',
  'https://upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Yellow_Tulip_icon.svg/32px-Yellow_Tulip_icon.svg.png',
  'https://upload.wikimedia.org/wikipedia/commons/thumb/f/f0/Orange_Tulip_icon.svg/32px-Orange_Tulip_icon.svg.png',
  'https://upload.wikimedia.org/wikipedia/commons/thumb/1/18/Purple_Tulip_icon.svg/32px-Purple_Tulip_icon.svg.png'
];

const tulipCount = 20;

for(let i=0;i<tulipCount;i++){
  const tulip = document.createElement('img');
  tulip.src = tulipImages[Math.floor(Math.random()*tulipImages.length)];
  const size = 15 + Math.random()*20;
  tulip.style.width = size + 'px';
  tulip.style.height = size + 'px';
  tulip.style.position = 'fixed';
  tulip.style.top = '-50px';
  tulip.style.left = Math.random()*100 + 'vw';
  tulip.style.opacity = 0.6;
  tulip.style.pointerEvents = 'none';
  tulip.style.zIndex = 1;

  // анимация
  const duration = 8 + Math.random()*7;
  const delay = Math.random()*5;
  tulip.style.animation = fall ${duration}s linear ${delay}s infinite;

  document.body.appendChild(tulip);
}
</script>

</body>
</html>
