<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="color-scheme" content="dark only">
  <title>С 8 Марта 🌷</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      background: #0f172a;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      background-color: #000;
      background-image: radial-gradient(circle at top, #1a1a1a, #000);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow-x: hidden;
      color-scheme: dark;
    }

    body {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 4px rgba(255, 255, 255, 0.8);
      opacity: 0.8;
      pointer-events: none;
      z-index: 1;
    }

    .glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, #ff4da6 0%, transparent 70%);
      filter: blur(140px);
      opacity: 0.35;
      animation: pulse 6s infinite alternate;
      z-index: 1;
    }

    @keyframes pulse {
      from { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
      to { opacity: 0.5; transform: translate(-50%, -50%) scale(1.1); }
    }

    .main {
      min-height: 100vh;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      z-index: 2;
    }

    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(30px);
      border-radius: 40px;
      padding: 60px 40px;
      max-width: 900px;
      width: 100%;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
      z-index: 3;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 20px;
      letter-spacing: 1px;
      min-height: 3rem;
      word-break: break-word;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 50px;
      opacity: 0.9;
      min-height: 200px;
      word-break: break-word;
    }

    .timer-container {
      margin-bottom: 40px;
      display: none;
    }

    .timer-label {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 5px;
      letter-spacing: 1px;
    }

    .timer {
      font-size: 28px;
      font-weight: 300;
      line-height: 1.4;
      letter-spacing: 1px;
      color: #fff;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
      word-break: break-word;
    }

    .minimal-media {
      margin: 20px 0;
      width: 100%;
      display: none;
    }

    .media-player {
      display: none;
      width: 100%;
    }

    .media-player.active {
      display: block;
    }

    .yandex-container,
    .video-container {
      width: 100%;
      max-width: 614px;
      margin: 0 auto;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      background: rgba(0, 0, 0, 0.3);
    }

    .yandex-container iframe {
      display: block;
      width: 100%;
      aspect-ratio: 614 / 244;
      border: none;
    }

    .yandex-fallback {
      display: none;
      width: 100%;
      max-width: 614px;
      margin: 0 auto;
      text-align: center;
    }

    .yandex-fallback a {
      display: inline-block;
      background: #ff4da6;
      color: white;
      padding: 14px 28px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 500;
      letter-spacing: 0.5px;
      transition: background 0.2s;
      border: none;
      cursor: pointer;
      margin: 20px 0;
    }

    .yandex-fallback a:hover {
      background: #ff7ab9;
    }

    @media (max-width: 600px) {
      .yandex-container {
        display: none;
      }
      .yandex-fallback {
        display: block;
      }
    }

    .video-container {
      position: relative;
      aspect-ratio: 16 / 9;
    }

    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .media-switch {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 25px;
    }

    .switch-dot {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
    }

    .switch-dot::before {
      content: '';
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
      transition: all 0.2s ease;
    }

    .switch-dot.active::before {
      background: #ff4da6;
      box-shadow: 0 0 12px #ff4da6;
      transform: scale(1.2);
    }

    .switch-dot:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      white-space: nowrap;
      margin-bottom: 8px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      pointer-events: none;
      z-index: 10;
    }

    @media (max-width: 700px) {
      .card {
        padding: 40px 30px;
        backdrop-filter: none;
        background: rgba(20, 20, 30, 0.8);
      }
    }

    @media (max-width: 600px) {
      .main {
        padding: 10px;
      }
      .card {
        padding: 30px 16px;
        border-radius: 24px;
      }
      h1 {
        font-size: 26px;
        margin-bottom: 16px;
      }
      p {
        font-size: 15px;
        margin-bottom: 30px;
        line-height: 1.5;
      }
      .timer {
        font-size: 20px;
      }
      .switch-dot {
        width: 32px;
        height: 32px;
      }
      .switch-dot:hover::after {
        display: none;
      }
      .stars {
        display: none;
      }
    }

    @media (max-width: 400px) {
      .card {
        padding: 20px 12px;
      }
      h1 {
        font-size: 22px;
      }
      p {
        font-size: 14px;
      }
      .timer {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>

<div class="stars"></div>

<div class="main">
  <div class="glow"></div>

  <div class="card">
    <!-- Заголовок (будет печататься) -->
    <h1 id="typewriter-title"></h1>

    <!-- Таймер (изначально скрыт) -->
    <div class="timer-container" id="timer-block">
      <div class="timer-label">Мы знакомы уже:</div>
      <div class="timer" id="timer">0 дней 00:00:00</div>
    </div>

    <!-- Основной текст (будет печататься) -->
    <p id="typewriter-paragraph"></p>

    <!-- Медиа-блок (изначально скрыт) -->
    <div class="minimal-media" id="media-block">
      <div class="media-player" id="player-yandex">
        <div class="yandex-container">
          <iframe 
            frameborder="0" 
            allow="autoplay; fullscreen; encrypted-media; clipboard-write"
            src="https://music.yandex.ru/iframe/album/27015943/track/116515817?autoplay=0"
            title="Яндекс.Музыка"
            loading="lazy">
          </iframe>
        </div>
        <div class="yandex-fallback">
          <a href="#" id="yandex-music-link">Слушать в Яндекс.Музыке</a>
        </div>
      </div>

      <div class="media-player" id="player-youtube">
        <div class="video-container">
          <iframe 
            title="YouTube"
            src="https://www.youtube.com/embed/AZ1psyyKmMY"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
            loading="lazy">
          </iframe>
        </div>
      </div>

      <div class="media-switch">
        <span class="switch-dot" data-media="yandex" data-tooltip="Яндекс.Музыка"></span>
        <span class="switch-dot" data-media="youtube" data-tooltip="YouTube"></span>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  "use strict";

  // === Звёздный фон ===
  function generateStars() {
    const starsContainer = document.querySelector('.stars');
    const card = document.querySelector('.card');
    if (!starsContainer || !card) return;

    if (window.innerWidth <= 600) return;

    starsContainer.innerHTML = '';

    const starCount = 25;
    const rect = card.getBoundingClientRect();

    function isInsideCard(xPercent, yPercent) {
      const x = (xPercent / 100) * window.innerWidth;
      const y = (yPercent / 100) * window.innerHeight;
      return (
        x >= rect.left &&
        x <= rect.right &&
        y >= rect.top &&
        y <= rect.bottom
      );
    }

    let created = 0;
    let attempts = 0;
    const maxAttempts = 500;

    while (created < starCount && attempts < maxAttempts) {
      attempts++;
      const x = Math.random() * 100;
      const y = Math.random() * 100;
      if (isInsideCard(x, y)) continue;

      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = x + '%';
      star.style.top = y + '%';
      const size = Math.random() * 4 + 2;
      star.style.width = size + 'px';
      star.style.height = size + 'px';
      starsContainer.appendChild(star);
      created++;
    }
  }

  window.addEventListener('load', generateStars);

  // === Таймер ===
  function plural(n, one, two, five) {
    n = Math.abs(n) % 100;
    const n1 = n % 10;
    if (n > 10 && n < 20) return five;
    if (n1 > 1 && n1 < 5) return two;
    if (n1 === 1) return one;
    return five;
  }

  function dateDiff(start, end) {
    let years = end.getFullYear() - start.getFullYear();
    let months = end.getMonth() - start.getMonth();
    let days = end.getDate() - start.getDate();
    let hours = end.getHours() - start.getHours();
    let minutes = end.getMinutes() - start.getMinutes();
    let seconds = end.getSeconds() - start.getSeconds();

    if (seconds < 0) { seconds += 60; minutes--; }
    if (minutes < 0) { minutes += 60; hours--; }
    if (hours < 0) { hours += 24; days--; }
    if (days < 0) {
      const prevMonth = new Date(end.getFullYear(), end.getMonth(), 0);
      days += prevMonth.getDate();
      months--;
    }
    if (months < 0) { months += 12; years--; }

    return { years, months, days, hours, minutes, seconds };
  }

  function updateTimer() {
    const startDate = new Date(2021, 1, 18);
    const now = new Date();
    const diff = dateDiff(startDate, now);

    const parts = [];

    if (diff.years > 0)
      parts.push(diff.years + ' ' + plural(diff.years, 'год', 'года', 'лет'));
    if (diff.months > 0)
      parts.push(diff.months + ' ' + plural(diff.months, 'месяц', 'месяца', 'месяцев'));
    if (diff.days > 0)
      parts.push(diff.days + ' ' + plural(diff.days, 'день', 'дня', 'дней'));
    if (diff.hours > 0)
      parts.push(diff.hours + ' ' + plural(diff.hours, 'час', 'часа', 'часов'));
    if (diff.minutes > 0)
      parts.push(diff.minutes + ' ' + plural(diff.minutes, 'минута', 'минуты', 'минут'));
    parts.push(diff.seconds + ' ' + plural(diff.seconds, 'секунда', 'секунды', 'секунд'));

    const timer = document.getElementById('timer');
    if (timer) timer.textContent = parts.join(' ');
  }

  // === Эффект печатной машинки (без курсора) ===
  const titleEl = document.getElementById('typewriter-title');
  const timerBlock = document.getElementById('timer-block');
  const paragraphEl = document.getElementById('typewriter-paragraph');
  const mediaBlock = document.getElementById('media-block');

  const titleText = 'С 8 Марта, моя прекрасная 🌷';

  const paragraphHTML = `Пусть этот день подарит тебе море улыбок и счастья.<br>
Ты — самое светлое, что есть в моей жизни.<br><br>
Каждое утро я просыпаюсь и думаю о тебе. Твой смех звучит для меня как самая красивая мелодия. Твои глаза сияют ярче всех звёзд на этом небе. Я благодарен судьбе за каждый миг, проведённый рядом с тобой.<br><br>
Ты делаешь этот мир лучше просто тем, что существуешь. В твоём сердце столько тепла и доброты, что им можно согреть всю планету. Ты — вдохновение, моя муза, моя опора и моя самая большая радость.<br><br>
Желаю тебе бесконечного счастья, крепкого здоровья, исполнения самых заветных желаний. Пусть каждый день приносит только приятные сюрпризы, пусть окружают только искренние люди, а в душе всегда цветёт весна. Ты заслуживаешь самого лучшего в этом мире, и я сделаю всё, чтобы ты это чувствовала каждый день.<br><br>
Спасибо тебе за твою улыбку, за твои объятия, за то, что ты просто есть. С 8 Марта, моя любимая! 🌷🌷🌷`;

  // Преобразуем HTML в обычный текст с символами новой строки для печати
  function getPlainTextWithNewlines(html) {
    return html.replace(/<br\s*\/?>/g, '\n').replace(/<[^>]*>/g, '');
  }

  const paragraphPlain = getPlainTextWithNewlines(paragraphHTML);
  const speed = 50; // миллисекунд на символ (можно настроить)

  // Функция для печати текста в элемент (без курсора)
  function typeText(element, text, callback) {
    let index = 0;
    element.innerHTML = ''; // очищаем элемент

    function type() {
      if (index < text.length) {
        const char = text.charAt(index);
        if (char === '\n') {
          element.innerHTML += '<br>';
        } else {
          element.innerHTML += char;
        }
        index++;
        setTimeout(type, speed);
      } else {
        // Печать завершена
        if (typeof callback === 'function') {
          callback();
        }
      }
    }

    // Запускаем печать
    type();
  }

  // Запуск всего процесса
  function startTypewriter() {
    // Шаг 1: печатаем заголовок
    typeText(titleEl, titleText, function() {
      // После заголовка показываем таймер
      timerBlock.style.display = 'block';
      // Запускаем обновление таймера, если ещё не запущен
      if (!window.timerInterval) {
        updateTimer();
        window.timerInterval = setInterval(updateTimer, 1000);
      }
      // Небольшая пауза перед печатью параграфа
      setTimeout(function() {
        // Шаг 2: печатаем параграф
        typeText(paragraphEl, paragraphPlain, function() {
          // После параграфа показываем медиа-блок
          mediaBlock.style.display = 'block';
          // Активируем нужный плеер
          activateAppropriateMedia();
        });
      }, 500);
    });
  }

  // === Переключение медиаплееров ===
  const dots = document.querySelectorAll('.switch-dot');
  const players = {
    yandex: document.getElementById('player-yandex'),
    youtube: document.getElementById('player-youtube')
  };

  function activateMedia(key) {
    dots.forEach(d => d.classList.remove('active'));
    Object.values(players).forEach(p => p && p.classList.remove('active'));

    const dot = [...dots].find(d => d.dataset.media === key);
    if (dot) dot.classList.add('active');
    if (players[key]) players[key].classList.add('active');
  }

  function detectMobile() {
    return window.innerWidth <= 600 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  }

  function activateAppropriateMedia() {
    if (detectMobile()) {
      activateMedia('youtube');
    } else {
      activateMedia('yandex');
    }
  }

  dots.forEach(dot => {
    dot.addEventListener('click', function(e) {
      e.stopPropagation();
      activateMedia(dot.dataset.media);
    });
  });

  const yandexLink = document.getElementById('yandex-music-link');
  if (yandexLink) {
    yandexLink.addEventListener('click', function(e) {
      e.preventDefault();
      window.open('https://music.yandex.ru/album/27015943/track/116515817', '_blank');
    });
  }

  // Стартуем после полной загрузки страницы
  window.addEventListener('load', startTypewriter);
})();
</script>
</body>
</html>
