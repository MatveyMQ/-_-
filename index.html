<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="color-scheme" content="dark only">
<title>С 8 Марта 🌷</title>

<link rel="preconnect" href="https://music.yandex.ru">
<link rel="preconnect" href="https://youtube.com">

<style>
*{box-sizing:border-box;margin:0;padding:0}

html{
  background:#0f172a;
}

html,body{
  width:100%;
  min-height:100vh;
  min-height:100dvh;
  background:#000 radial-gradient(circle at top,#1a1a1a,#000);
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  overflow-x:hidden;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  position:relative;
}

.stars{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
}

.star{
  position:absolute;
  background:#fff;
  border-radius:50%;
  box-shadow:0 0 4px rgba(255,255,255,.8);
  opacity:.8;
}

.glow{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:800px;
  height:800px;
  background:radial-gradient(circle,#ff4da6 0%,transparent 70%);
  filter:blur(140px);
  opacity:.35;
  animation:pulse 6s infinite alternate;
  will-change:transform,opacity;
  z-index:1;
}

@keyframes pulse{
  from{opacity:.3;transform:translate(-50%,-50%) scale(1)}
  to{opacity:.5;transform:translate(-50%,-50%) scale(1.1)}
}

.main{
  min-height:100vh;
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  position:relative;
  z-index:2;
}

.card{
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(30px);
  border-radius:40px;
  padding:60px 40px;
  max-width:900px;
  width:100%;
  text-align:center;
  box-shadow:0 30px 80px rgba(0,0,0,.7);
  position:relative;
  z-index:3;
}

h1{
  font-size:40px;
  margin-bottom:20px;
  min-height:3rem;
}

p{
  font-size:18px;
  line-height:1.6;
  margin-bottom:50px;
  min-height:200px;
  opacity:.9;
}

.timer-container{display:none;margin-bottom:40px}
.timer-label{font-size:14px;opacity:.7;margin-bottom:5px}
.timer{font-size:28px;font-weight:300}

.minimal-media{display:none;margin-top:20px}

.media-player{display:none}
.media-player.active{display:block}

.yandex-container,.video-container{
  width:100%;
  max-width:614px;
  margin:0 auto;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
}

.yandex-container iframe{
  width:100%;
  aspect-ratio:614/244;
  border:none;
}

.video-container{
  position:relative;
  aspect-ratio:16/9;
}

.video-container iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:none;
}

.media-switch{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:25px;
}

.switch-dot{
  width:30px;
  height:30px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.switch-dot::before{
  content:'';
  width:14px;
  height:14px;
  border-radius:50%;
  background:#fff;
  transition:.2s;
}

.switch-dot.active::before{
  background:#ff4da6;
  box-shadow:0 0 12px #ff4da6;
  transform:scale(1.2);
}

@media(max-width:700px){
  .card{
    backdrop-filter:none;
    background:rgba(20,20,30,.85);
  }
}

@media(max-width:600px){
  h1{font-size:26px}
  p{font-size:15px}
  .timer{font-size:20px}
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="main">
<div class="glow"></div>

<div class="card">
<h1 id="title"></h1>

<div class="timer-container" id="timer-block">
<div class="timer-label">Мы знакомы уже:</div>
<div class="timer" id="timer"></div>
</div>

<p id="text"></p>

<div class="minimal-media" id="media">
<div class="media-player active" id="yandex">
<div class="yandex-container">
<iframe src="https://music.yandex.ru/iframe/album/25511786/track/106597497"
loading="lazy"
allow="autoplay; encrypted-media"></iframe>
</div>
</div>

<div class="media-player" id="youtube">
<div class="video-container">
<iframe src="https://www.youtube.com/embed/H6tNm72cMA8"
loading="lazy"
allowfullscreen></iframe>
</div>
</div>

<div class="media-switch">
<span class="switch-dot active" data-target="yandex"></span>
<span class="switch-dot" data-target="youtube"></span>
</div>

</div>
</div>
</div>

<script>
"use strict";

const starsContainer=document.querySelector('.stars');
const card=document.querySelector('.card');

function generateStars(){
  starsContainer.innerHTML='';
  const starCount=window.innerWidth<=600?15:25;
  const rect=card.getBoundingClientRect();

  for(let i=0;i<starCount;i++){
    let star=document.createElement('div');
    star.className='star';

    let x,y;
    do{
      x=Math.random()*window.innerWidth;
      y=Math.random()*window.innerHeight;
    }while(x>rect.left&&x<rect.right&&y>rect.top&&y<rect.bottom);

    star.style.left=(x/window.innerWidth*100)+'%';
    star.style.top=(y/window.innerHeight*100)+'%';
    let size=Math.random()*4+2;
    star.style.width=size+'px';
    star.style.height=size+'px';

    starsContainer.appendChild(star);
  }
}

let resizeTimeout;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimeout);
  resizeTimeout=setTimeout(generateStars,200);
});

window.addEventListener('load',generateStars);

const titleText='С 8 Марта, моя прекрасная 🌷';
const paragraphText=`Пусть этот день подарит тебе море улыбок и счастья.
Ты — самое светлое, что есть в моей жизни.
Каждое утро я просыпаюсь и думаю о тебе... 🌷🌷🌷`;

function typeText(el,text,callback){
  let i=0;
  const interval=setInterval(()=>{
    if(i>=text.length){
      clearInterval(interval);
      if(callback)callback();
      return;
    }
    if(text[i]==="\n")el.appendChild(document.createElement('br'));
    else el.appendChild(document.createTextNode(text[i]));
    i++;
  },30);
}

function start(){
  typeText(document.getElementById('title'),titleText,()=>{
    document.getElementById('timer-block').style.display='block';
    setInterval(updateTimer,1000);
    typeText(document.getElementById('text'),paragraphText,()=>{
      document.getElementById('media').style.display='block';
    });
  });
}

function updateTimer(){
  const startDate=new Date(2021,1,18);
  const diff=Date.now()-startDate.getTime();
  const sec=Math.floor(diff/1000)%60;
  const min=Math.floor(diff/60000)%60;
  const hr=Math.floor(diff/3600000)%24;
  const days=Math.floor(diff/86400000);
  document.getElementById('timer').textContent=
    days+' дней '+hr+' ч '+min+' мин '+sec+' сек';
}

document.querySelectorAll('.switch-dot').forEach(dot=>{
  dot.addEventListener('click',()=>{
    document.querySelectorAll('.switch-dot').forEach(d=>d.classList.remove('active'));
    document.querySelectorAll('.media-player').forEach(p=>p.classList.remove('active'));
    dot.classList.add('active');
    document.getElementById(dot.dataset.target).classList.add('active');
  });
});

window.addEventListener('load',start);
</script>

</body>
</html>
